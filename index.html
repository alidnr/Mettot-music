<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METTOT — Official</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    color:white;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.85)),
    url('background.jpg');
    background-size:cover;
    /* DÜZELTME: Sayfa ilk açıldığında kafanın görünmesi için en üstten (top) hizalandı */
    background-position:center top; 
    background-attachment:fixed;
    overflow-x:hidden;
}

/* NAVBAR */

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:20px 40px;
    background:rgba(0,0,0,.65);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:9999;
}

.logo{
    font-size:42px;
    font-weight:900;
    letter-spacing:3px;
}

.menu{
    display:flex;
    gap:30px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-weight:700;
    font-size:18px;
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 20px 60px;
}

.hero-content h1{
    font-size:120px;
    font-weight:900;
}

.hero-content p{
    font-size:28px;
    letter-spacing:4px;
    margin-top:10px;
}

/* ALBUMLER */

.albumler{
    padding:100px 60px;
}

.albumler h2{
    text-align:center;
    font-size:60px;
    margin-bottom:50px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.kart{
    position:relative;
    height:450px;
    border-radius:20px;
    overflow:hidden;
    text-decoration:none;
    color:white;
    display:block;
}

.kart img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.kart::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:60%;
    background:linear-gradient(transparent,rgba(0,0,0,.95));
}

.kart-yazi{
    position:absolute;
    bottom:20px;
    left:20px;
    z-index:5;
}

.kart-yazi h3{
    font-size:32px;
    margin-bottom:5px;
}

/* ILETISIM — Masaüstünde de tam ortada toplanması sağlandı */
.iletisim-section {
    padding: 100px 20px;
}

.iletisim-container {
    max-width: 600px;
    margin: 0 auto;
    text-align:center;
    font-size:22px;
    line-height:55px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.iletisim-container a{
    color:white;
    text-decoration:none;
}

/* FOOTER */

footer{
    background:black;
    padding:40px;
    text-align:center;
}

/* MOBIL */

@media(max-width:768px){

    body{
        background-position: center top;
    }

    nav{
        flex-direction: row;
        justify-content: space-between;
        padding: 15px 20px;
        background: rgba(0,0,0,.80);
    }

    .logo{
        font-size: 22px;
        letter-spacing: 1px;
    }

    .menu{
        gap: 12px;
    }

    .menu a{
        font-size: 13px;
        font-weight: 600;
    }

    .hero{
        min-height: 85vh;
        padding-top: 100px;
    }

    .hero-content h1{
        font-size: 64px;
        letter-spacing: 2px;
    }

    .hero-content p{
        font-size: 16px;
        letter-spacing: 1px;
        margin-top: 5px;
        opacity: 0.8;
    }

    .albumler{
        padding: 50px 0px 50px 20px;
    }

    .albumler h2{
        font-size: 32px;
        text-align: left;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    .grid{
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding-right: 20px;
        gap: 20px;
        -webkit-overflow-scrolling: touch;
    }
    
    .grid::-webkit-scrollbar {
        display: none;
    }

    .kart{
        flex: 0 0 260px;
        height: 380px;
        scroll-snap-align: start;
        border-radius: 15px;
    }

    .kart-yazi h3{
        font-size: 20px;
    }
    
    .kart-yazi p{
        font-size: 12px;
        opacity: 0.7;
    }

    .iletisim-section {
        padding: 50px 20px;
    }

    .iletisim-container{
        font-size: 16px;
        line-height: 35px;
        text-align: center;
        align-items: center;
    }
}

</style>
</head>
